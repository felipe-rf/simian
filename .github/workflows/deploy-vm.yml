name: Deploy to GCE VM

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ANSIBLE_DIR: ansible

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push immutable API image
        id: image
        env:
          IMAGE_URI: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Write SSH private key
        run: |
          cat > ./id_ed25519 <<'EOF'
          ${{ secrets.VM_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ./id_ed25519

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Build Ansible inventory
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_SSH_USER: ${{ secrets.VM_SSH_USER }}
        run: |
          if [ -z "$VM_IP" ]; then
            echo "VM_IP secret is required"
            exit 1
          fi
          USERNAME="${VM_SSH_USER:-ubuntu}"
          cat > ${{ env.ANSIBLE_DIR }}/inventory.ini <<EOF
          [api]
          vm ansible_host=${VM_IP} ansible_user=${USERNAME}
          EOF

      - name: Deploy with Ansible
        env:
          ANSIBLE_CONFIG: ${{ env.ANSIBLE_DIR }}/ansible.cfg
          DOCKER_REGISTRY_HOST: docker.io
          DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          API_IMAGE: ${{ steps.image.outputs.uri }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          if [ -z "$POSTGRES_DB" ] || [ -z "$POSTGRES_USER" ] || [ -z "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_DB, POSTGRES_USER and POSTGRES_PASSWORD secrets are required"
            exit 1
          fi

          DB_PORT_VALUE="${DB_PORT:-5432}"

          cat > /tmp/ansible-extra-vars.yml <<EOF
          docker_registry_host: "${DOCKER_REGISTRY_HOST}"
          docker_registry_username: "${DOCKER_REGISTRY_USERNAME}"
          docker_registry_token: "${DOCKER_REGISTRY_TOKEN}"
          api_image: "${API_IMAGE}"
          postgres_db: "${POSTGRES_DB}"
          postgres_user: "${POSTGRES_USER}"
          postgres_password: "${POSTGRES_PASSWORD}"
          db_port: "${DB_PORT_VALUE}"
          EOF

          ansible-playbook \
            -i ${{ env.ANSIBLE_DIR }}/inventory.ini \
            --private-key ./id_ed25519 \
            ${{ env.ANSIBLE_DIR }}/playbook.yml \
            -e @/tmp/ansible-extra-vars.yml
