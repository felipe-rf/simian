name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config >/dev/null

      - name: Build API image
        run: docker build -t simian-ci .
