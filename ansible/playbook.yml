---
- name: Deploy simian API stack
  hosts: api
  become: true
  vars:
    app_dir: /opt/simian
    docker_registry_host: "docker.io"
    docker_registry_username: ""
    docker_registry_token: ""
    api_image: ""
    postgres_db: "simian"
    postgres_user: "postgres"
    postgres_password: ""
    db_port: "5432"
  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - git
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy base compose file
      ansible.builtin.copy:
        src: "../docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy deploy compose override
      ansible.builtin.copy:
        src: "../docker-compose.deploy.yml"
        dest: "{{ app_dir }}/docker-compose.deploy.yml"
        mode: "0644"

    - name: Copy database migrations
      ansible.builtin.copy:
        src: "../db/migrations/"
        dest: "{{ app_dir }}/db/migrations/"
        mode: preserve

    - name: Write deployment environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env.deploy"
        mode: "0600"
        content: |
          API_IMAGE={{ api_image }}
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          DB_PORT={{ db_port }}

    - name: Login to container registry
      ansible.builtin.shell: |
        set -euo pipefail
        echo "{{ docker_registry_token }}" | docker login -u "{{ docker_registry_username }}" --password-stdin "{{ docker_registry_host }}"
      no_log: true
      changed_when: true

    - name: Start application stack
      ansible.builtin.command:
        cmd: docker compose --env-file .env.deploy -f docker-compose.yml -f docker-compose.deploy.yml up -d --pull always --remove-orphans
        chdir: "{{ app_dir }}"
      changed_when: true
