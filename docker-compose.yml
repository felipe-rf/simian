services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: simian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simian"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    depends_on:
      db:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://db:5432/simian
      -user=postgres
      -password=postgres
      -connectRetries=10
      -validateMigrationNaming=true
      migrate
    volumes:
      - ./db/migrations:/flyway/sql

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: simian
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata:
